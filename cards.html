<!DOCTYPE html>
<html lang="en">
<head>
    <title>Cards</title>
    <link rel="stylesheet" href="styles.css">   
</head>
<body>

    <div class="tab-menu">
        <button type="button" class="tab-links" onclick="changeTab(event, 'zen-mode')">Zen Mode</button>
        <button type="button" class="tab-links" onclick="changeTab(event, 'time-mode')">Time Mode</button>
    </div>

    <p></p>

    <div id="zen-mode" class="tab-content">

        <div class="deck-selection-menu">
        </div>

        <p></p>

        <div class="action-menu">
            <button type="button" class="action-links" onclick="currentDeck.draw()">Draw</button>
            <button type="button" class="action-links" onclick="currentDeck.resetDeck()">Reset deck</button>
            <button type="button" class="action-links" onclick="clearBoard()">Clear board</button>
        </div>

        <p id="error-message"></p>

        <div class="card-display-area">
        </div>

    </div>

    <div id="time-mode" class="tab-content">
        <div class="deck-selection-menu">
        </div>

        <p></p>

        <div class="action-menu">
            <button type="button" class="action-links" onclick="currentDeck.draw()">Draw</button>
            <button type="button" class="action-links" onclick="currentDeck.resetDeck()">Reset deck</button>
            <button type="button" class="action-links" onclick="clearBoard()">Clear board</button>
        </div>

        <p id="error-message"></p>

        <div class="card-display-area">
        </div>
    </div>

    <script src="cards.js"></script>

</body>
</html>
